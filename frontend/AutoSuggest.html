<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
    <link rel="stylesheet" href="AutoSuggest.css">
</head>
<body>

    <fieldset>

        <div class="top-bar">
            <div class="status">
                &#9711; online
            </div>

            <div class="time">
                &#9711; - ms
            </div>
        </div>

        <h1>
            <span class="being">Being</span><span class="infinity">Infinity</span>
        </h1>

        <p class="description">
            One million phrases. Four algorithms. Prefix Based Auto Suggest.
        </p>

        <div class="search-box">
            <span class="icon">&#128269;</span>

            <input
                type="text"
                id="search"
                placeholder="Start typing to search phrases..."
                autocomplete="off">
        </div>

        <div id="suggestions-box"></div>

    </fieldset>

    <p class="footer">
        Copyright &copy; Being Infinity Pvt. Ltd.
    </p>

<script>

var searchInput = document.getElementById("search");
var suggestionsBox = document.getElementById("suggestions-box");
var timeBox = document.querySelector(".time");

searchInput.addEventListener("input", function(){

    var userInput = searchInput.value.trim();

    if(userInput==""){
        suggestionsBox.innerHTML="";
        timeBox.innerHTML="○ - ms";
        return;
    }

    var start = performance.now();

    var url =
    "https://autosuggest-backend.onrender.com/api/autosuggest?q="
    + encodeURIComponent(userInput)
    + "&algorithm=brute&limit=10&weighted=false";

    fetch(url)

    .then(function(response){
        return response.json();
    })

    .then(function(data){

        console.log(data);

        var end = performance.now();
        timeBox.innerHTML = Math.round(end-start)+" ms";

        var list = data.results || data.suggestions || [];

        var html="";

        if(list.length==0){

            html="<div class='suggestion'>No Suggestions Found</div>";

        }

        else{

            for(var i=0;i<list.length;i++){

                html += "<div class='suggestion'>"+list[i]+"</div>";

            }

        }

        suggestionsBox.innerHTML=html;

        var suggestions=document.querySelectorAll(".suggestion");

        for(var i=0;i<suggestions.length;i++){

            suggestions[i].onclick=function(){

                searchInput.value=this.innerHTML;
                suggestionsBox.innerHTML="";

            };

        }

    })

    .catch(function(error){

        console.log(error);

        suggestionsBox.innerHTML="<div class='suggestion'>Unable to connect to server</div>";

    });

});

</script>

</body>
</html>
