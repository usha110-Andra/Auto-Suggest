<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
    <link rel="stylesheet" href="AutoSuggest.css">
</head>
<body>

    <fieldset>

        <div class="top-bar">
            <div class="status">
                &#9711; online |
            </div>

            <div class="time">
                &#9711; - ms
            </div>
        </div>

        <h1>
            <span class="being">Being</span><span class="infinity">Infinity</span>
        </h1>

        <p class="description">
            One million phrases. Four algorithms. Prefix Based Auto Suggest.
        </p>

        <div class="search-box">
            <span class="icon">&#128269;</span>
            <input type="text" placeholder="Start typing to search phrases">
        </div>

        <div id="suggestions-box">
            Suggestion Box
        </div>

    </fieldset>

    <p class="footer">
        Copyright &copy; Being Infinity Pvt. Ltd.
    </p>

</body>
</html>
