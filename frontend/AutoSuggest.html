<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
    <link rel="stylesheet" href="AutoSuggest.css">
</head>
<body>

    <fieldset>

        <div class="top-bar">
            <div class="status">
                &#9711; online
            </div>

            <div class="time">
                &#9711; - ms
            </div>
        </div>

        <h1>
            <span class="being">Being</span><span class="infinity">Infinity</span>
        </h1>

        <p class="description">
            One million phrases. Four algorithms. Prefix Based Auto Suggest.
        </p>

        <div class="search-box" id="search-box">
            <span class="icon">&#128269;</span>
            <input
                type="text"
                id="search"
                placeholder="Start typing to search phrases"
            >
        </div>

        <div id="suggestions-box">
            <!-- Suggestions will appear here -->
        </div>

    </fieldset>

    <p class="footer">
        Copyright &copy; Being Infinity Pvt. Ltd.
    </p>
    <script>
        var searchBox = document.getElementById("search-box");
        


        searchBox.addEventListener("input", function() {

            // 1. get user typed text
            var userInput = searchBox.value;
            if(userInput.trim()===""){

            }else{
                var url1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url2="&algorithm=brute&limit=10&weighted=false";
                var url=url1+userInput+url2;


            }
            // 2. make UPI call to get suggestion

            fetch(url)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                
                console.log(data);
                var resultsArray = data.results;
                var htmlresults = "";
                for(var i=0;i<resultsArray.length;i++){
                    htmlresults += "<div>" + resultsArray[i] + "</div>"
                }
                //var suggestionsBox = document.getElementById("suggestions-box");
                suggestionsBox.innerHTML = htmlresults;
            })
            //display data in html
        });
    
    </script>

</body>
</html>
